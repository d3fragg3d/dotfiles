# ==================================================
# Chris King - Hyprland v1
# Arch Linux / Laptop / Catppuccin Base
# ==================================================

################
# MONITORS
################

monitor=,preferred,auto,1

################
# VARIABLES
################

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = fuzzel
$browser = zen-browser

################
# AUTOSTART
################

exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = nm-applet
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = bash -c 'while true; do ~/.config/hypr/scripts/battery-check.sh; sleep 120; done'

################
# ENVIRONMENT
################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11

################
# GENERAL
################

general {
    gaps_in = 6
    gaps_out = 12

    border_size = 2

    col.active_border = rgb(c4956a)
    col.inactive_border = rgb(3d3228)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

################
# DECORATION
################

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(0a0906ee)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.15
    }
}

################
# ANIMATIONS
################

animations {
    enabled = yes

    bezier = smooth, 0.22, 0.9, 0.3, 1.0
    bezier = soft,   0.25, 0.8, 0.25, 1.0
    bezier = quick,  0.15, 0.0, 0.1, 1.0

    animation = windows,      1, 6, smooth
    animation = windowsIn,    1, 6, smooth, popin 85%
    animation = windowsOut,   1, 5, soft, popin 85%
    animation = border,       1, 8, default
    animation = fade,         1, 6, soft
    animation = workspaces,   1, 6, smooth
    animation = layers,       1, 5, smooth
}

################
# LAYOUTS
################

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

################
# INPUT
################

input {
    kb_layout = gb
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        clickfinger_behavior = true
        scroll_factor = 1.0
    }
}

################
# KEYBINDS
################

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/nightmode.sh

# Windows
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, forcekillactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, Space, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 60% 60% && hyprctl dispatch centerwindow
bind = $mainMod SHIFT, Space, centerwindow
bind = $mainMod SHIFT, E, exit
bind = $mainMod, H, resizeactive, -80 0
bind = $mainMod, L, resizeactive, 80 0
bind = $mainMod, K, resizeactive, 0 -80
bind = $mainMod, J, resizeactive, 0 80

# Focus movement
bind = SHIFT, left, movefocus, l
bind = SHIFT, down, movefocus, d
bind = SHIFT, up, movefocus, u
bind = SHIFT, right, movefocus, r

# Workspace cycling
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1
bind = $mainMod, TAB, workspace, previous

# Numbered workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse workspace switching
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Clipboard
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
bind = $mainMod CTRL, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot" "Saved to Pictures/Screenshots"
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mainMod ALT, S, exec, grim -g "$(slurp)" - | swappy -f -

################
# WINDOW RULES
################

windowrule = match:float 1, center 1
windowrule = match:float 1, size 60% 60%

################
# MEDIA KEYS
################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send "Volume Up"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send "Volume Down"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send "Audio" "Mute toggled"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send "Brightness Up"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send "Brightness Down"

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPause, exec, playerctl play-pause

################
# MISC
################

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}
